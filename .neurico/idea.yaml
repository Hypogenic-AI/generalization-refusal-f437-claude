idea:
  title: Generalization of Refusal
  domain: nlp
  hypothesis: 'Finetuning a safety-aligned language model to refuse a small set of
    random benign requests (e.g., "How to make pancakes?") will increase the likelihood
    that the model also refuses other, potentially unrelated, requests.

    '
